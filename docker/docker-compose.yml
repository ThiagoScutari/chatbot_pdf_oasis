# ──────────────────────────────────────────────
#  CatalogFlow — Stack de desenvolvimento local
# ──────────────────────────────────────────────
#  Uso:
#    docker compose -f docker/docker-compose.yml up
#    docker compose -f docker/docker-compose.yml up -d postgres redis minio
#
#  Serviços expostos:
#    api      → http://localhost:8004
#    flower   → http://localhost:5556  (Celery monitoring, dev only)
#    minio    → http://localhost:9003  (console web)
#    minio s3 → http://localhost:9002
#    postgres → localhost:5437
#    redis    → localhost:6380
# ──────────────────────────────────────────────

name: catalogflow

x-app-base: &app-base
  build:
    context: ..
    dockerfile: docker/Dockerfile
    target: production
  env_file:
    - ../.env
  volumes:
    - ../src:/app/src:ro
    - ../migrations:/app/migrations:ro
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

services:
  # ── Banco de dados ──────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-catalogflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-catalogflow}
      POSTGRES_DB: ${POSTGRES_DB:-catalogflow}
    ports:
      - "5437:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-catalogflow} -d ${POSTGRES_DB:-catalogflow}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ── Cache / Broker ──────────────────────────
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── Storage S3-compatible (dev) ─────────────
  # MinIO substitui R2/S3 em dev local. Em produção, esses serviços não rodam.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minio-dev-key}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minio-dev-secret}
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Cria o bucket de dev na primeira subida.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID:-minio-dev-key} ${AWS_SECRET_ACCESS_KEY:-minio-dev-secret} &&
      mc mb --ignore-existing local/${S3_BUCKET:-catalogflow-dev} &&
      mc anonymous set download local/${S3_BUCKET:-catalogflow-dev} || true
      "

  # ── Aplicação ───────────────────────────────
  api:
    <<: *app-base
    command: ["uvicorn", "catalogflow.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8004:8000"

  worker:
    <<: *app-base
    command: ["celery", "-A", "catalogflow.infra.celery_app", "worker", "--loglevel=info", "--concurrency=2", "--queues=catalog,orders,romaneio,default"]

  beat:
    <<: *app-base
    command: ["celery", "-A", "catalogflow.infra.celery_app", "beat", "--loglevel=info", "--schedule=/tmp/celerybeat-schedule"]

  flower:
    <<: *app-base
    command: ["celery", "-A", "catalogflow.infra.celery_app", "flower", "--port=5555"]
    ports:
      - "5556:5555"

volumes:
  postgres_data:
  redis_data:
  minio_data:
