repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: [src/]
        pass_filenames: false
        additional_dependencies:
          - pydantic>=2
          - pydantic-settings>=2
          - sqlalchemy[asyncio]==2.0.36
          - types-redis
          - fastapi==0.115.6
          - httpx==0.27.0
          - pytest>=8
          - pytest-asyncio>=0.24
          - types-python-jose>=3.3
          - boto3-stubs[s3]>=1.35
          - email-validator>=2
          - celery>=5.4
          - itsdangerous>=2.1
          - bcrypt>=4
          - respx>=0.21
          - structlog>=24
          - pymupdf>=1.27
          - resend>=2
