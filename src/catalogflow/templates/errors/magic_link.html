{% extends "base.html" %}

{% block title %}Link inválido — Oasis{% endblock %}

{% block shell %}{% endblock %}

{% block content %}
<div class="login-screen">
  <div class="login-card">
    <h1 class="login-title">Link inválido</h1>
    <p class="empty-body">{{ message or "Este link expirou ou já foi usado." }}</p>
    <p class="login-hint">
      <a href="/forgot-password">Solicitar novo link</a>
      <span class="hint-sep"> · </span>
      <a href="/login">Voltar ao login</a>
    </p>
  </div>
</div>
{% endblock %}
