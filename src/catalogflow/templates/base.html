<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FAF8F5">
  <title>{% block title %}CatalogFlow — Oasis Resortwear{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/static/css/app.css">

  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <script src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js" defer></script>
  <script src="/static/js/app.js" defer></script>
</head>
<body>

{% block shell %}
<header class="shell-header" x-data="{ open: false }">
  <div class="shell-header-inner">
    <button
      type="button"
      class="hamburger"
      aria-label="Abrir menu"
      @click="open = true"
    >&#9776;</button>

    <div class="brand-stack">
      <span class="brand-mark">OASIS</span>
      <span class="brand-sub">CatalogFlow</span>
    </div>

    <nav class="nav-desktop" aria-label="Navegação principal">
      <a href="/dashboard">Dashboard</a>
      <a href="/catalogs">Catálogos</a>
      <a href="/orders">Pedidos</a>
      <a href="/logout">Sair</a>
    </nav>
  </div>

  <!-- Side drawer (mobile) -->
  <template x-if="open">
    <div>
      <div
        class="menu-overlay"
        @click="open = false"
        x-transition.opacity
      ></div>
      <aside
        class="side-menu"
        @click.outside="open = false"
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0 -translate-x-4"
        x-transition:enter-end="opacity-100 translate-x-0"
      >
        <button
          type="button"
          class="side-menu-close"
          aria-label="Fechar menu"
          @click="open = false"
        >&times;</button>

        <div class="brand-stack">
          <span class="brand-mark">OASIS</span>
          <span class="brand-sub">CatalogFlow</span>
        </div>

        <nav aria-label="Navegação">
          <a href="/dashboard" @click="open = false">Dashboard</a>
          <a href="/catalogs"  @click="open = false">Catálogos</a>
          <a href="/orders"    @click="open = false">Pedidos</a>
          <hr>
          <a href="/logout">Sair</a>
        </nav>
      </aside>
    </div>
  </template>
</header>
{% endblock %}

<main class="page">
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</main>

<!-- Toast tray (canto superior direito) -->
<div class="toast-tray" x-data>
  <template x-for="t in $store.toasts.items" :key="t.id">
    <div class="toast" :class="t.kind">
      <span class="toast-icon" aria-hidden="true"></span>
      <span x-text="t.message"></span>
      <button
        type="button"
        class="toast-close"
        aria-label="Fechar"
        @click="$store.toasts.hide(t.id)"
      >&times;</button>
    </div>
  </template>
</div>

</body>
</html>
