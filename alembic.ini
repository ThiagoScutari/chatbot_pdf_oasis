# ──────────────────────────────────────────────
#  Alembic — CatalogFlow
# ──────────────────────────────────────────────
#  A URL real do banco é resolvida em runtime a partir de
#  `catalogflow.infra.settings.get_settings().database_url`.
#  Este arquivo é apenas configuração estrutural.

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
recursive_version_locations = false
sqlalchemy.url = driver://user:pass@localhost/dbname

# Format das versões: 0001_descricao.py, 0002_descricao.py...
file_template = %%(rev)s_%%(slug)s

# ──────────────────────────────────────────────
#  Logging
# ──────────────────────────────────────────────

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
